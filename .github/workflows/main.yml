name: Build Continue Extension (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install Global Dependencies
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Root Install
        run: npm install
        shell: pwsh

      - name: Build Internal Dependencies
        # These MUST be built before 'core' can see your Qwen changes
        run: |
          cd packages/fetch; npm install; npm run build; cd ../..
          cd packages/config-yaml; npm install; npm run build; cd ../..
          cd packages/openai-adapters; npm install; npm run build; cd ../..
          cd packages/llm-info; npm install; npm run build; cd ../..
        shell: pwsh

      - name: Build Core (Your Qwen Changes)
        run: |
          cd core
          npm install
          # We use --if-present to ensure it generates the dist files even if tests linger
          npm run build --if-present
          cd ..
        shell: pwsh

      - name: Build GUI
        run: |
          cd gui
          npm install
          # Skip strict type checking to ensure the build finishes
          npx vite build
          cd ..
        shell: pwsh

      - name: Package VSIX
        run: |
          cd extensions/vscode
          npm install
          npm run prepackage
          # Target win32-x64 to include the correct Windows binaries
          vsce package --target win32-x64 --out build/continue-qwen-windows.vsix
        shell: pwsh

      - name: Upload Final VSIX
        uses: actions/upload-artifact@v4
        with:
          name: continue-extension-with-qwen
          path: extensions/vscode/build/continue-qwen-windows.vsix
