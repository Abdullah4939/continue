name: Build VSIX (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install Global Dependencies
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Install All Dependencies (Workspaces)
        # In modern npm, this command installs everything and links packages automatically
        run: npm install
        shell: pwsh

      - name: Build Core
        # We target the core workspace directly
        run: |
          cd core
          npm run build
          cd ..
        shell: pwsh

      - name: Build GUI (Skip Strict Type Check if needed)
        # If tsc fails due to strict types, we use 'vite build' directly to get the VSIX out
        run: |
          cd gui
          npx vite build
          cd ..
        shell: pwsh

      - name: Package Extension for Windows
        run: |
          cd extensions/vscode
          # Ensure vscode dependencies are ready
          npm install
          npm run prepackage
          vsce package --target win32-x64 --out build/continue-windows-x64.vsix
        shell: pwsh

      - name: Upload Windows VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: continue-windows-extension
          path: extensions/vscode/build/continue-windows-x64.vsix
