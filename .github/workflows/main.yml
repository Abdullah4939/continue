name: Build Continue with Qwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'

      - name: Install C++ Build Tools & SDK
        # This fixes the sqlite3 / node-gyp "missing Windows SDK" error
        run: |
          Install-Module -Name Chocolatey -Force -AllowClobber
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.Windows11SDK.22621 --quiet --wait"
        shell: pwsh

      - name: Install Global Tooling
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Root Install
        run: npm install
        shell: pwsh

      - name: Build Internal Dependencies
        run: |
          cd packages/config-types; npm install; npm run build; cd ../..
          cd packages/terminal-security; npm install; npm run build; cd ../..
          cd packages/fetch; npm install; npm run build; cd ../..
          cd packages/openai-adapters; npm install; npm run build; cd ../..
          cd packages/config-yaml; npm install; npm run build; cd ../..
          cd packages/llm-info; npm install; npm run build; cd ../..
        shell: pwsh

      - name: Build Core
        run: |
          cd core
          npm install partial-json
          npm install
          # Skip strict check but emit JS
          npx tsc -p tsconfig.npm.json --skipLibCheck --noEmitOnError false
          cd ..
        shell: pwsh
        continue-on-error: true

      - name: Build GUI
        run: |
          cd gui
          npm install partial-json
          npm install
          npx vite build
          cd ..
        shell: pwsh

      - name: Package VS Code Extension
        run: |
          cd extensions/vscode
          npm install
          npm run prepackage
          vsce package --target win32-x64 --out build/continue-qwen.vsix
        shell: pwsh

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: continue-qwen-extension
          path: extensions/vscode/build/continue-qwen.vsix
