name: Build Continue with Qwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Global Tooling
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Root Install
        run: npm install
        shell: pwsh

      - name: Build Internal Dependencies
        # This list ensures every package required by 'esbuild' is ready
        run: |
          cd packages/config-types; npm install; npm run build; cd ../..
          cd packages/terminal-security; npm install; npm run build; cd ../..
          cd packages/fetch; npm install; npm run build; cd ../..
          cd packages/openai-adapters; npm install; npm run build; cd ../..
          cd packages/config-yaml; npm install; npm run build; cd ../..
          cd packages/llm-info; npm install; npm run build; cd ../..
        shell: pwsh

      - name: Build Core (Compiling Qwen)
        run: |
          cd core
          npm install
          # Skip strict check but emit JS for the bundler
          npx tsc -p tsconfig.npm.json --skipLibCheck --noEmitOnError false
          cd ..
        shell: pwsh
        continue-on-error: true

      - name: Build GUI
        run: |
          cd gui
          npm install
          npx vite build
          cd ..
        shell: pwsh

      - name: Package VS Code Extension
        run: |
          cd extensions/vscode
          npm install
          # This triggers the esbuild script that was failing
          npm run prepackage
          vsce package --target win32-x64 --out build/continue-qwen.vsix
        shell: pwsh

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: continue-qwen-extension
          path: extensions/vscode/build/continue-qwen.vsix
