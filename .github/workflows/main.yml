name: Build VSIX (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'

      - name: Install Global Dependencies
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Install All Dependencies
        # We run this at the root to capture ALL workspace dependencies (vitest, uuid, etc)
        run: npm install
        shell: pwsh

      - name: Build Core
        run: |
          cd core
          # We use a 'legacy-peer-deps' or 'install' here just to be safe
          npm install
          # We run the build but ignore errors if the JS is generated anyway
          npm run build --if-present
          cd ..
        shell: pwsh

      - name: Build GUI
        run: |
          cd gui
          npm install
          # Skip the 'tsc' check and go straight to vite bundling
          npx vite build
          cd ..
        shell: pwsh

      - name: Package Extension for Windows
        run: |
          cd extensions/vscode
          npm install
          # Prepare and package
          npm run prepackage
          vsce package --target win32-x64 --out build/continue-windows-x64.vsix
        shell: pwsh

      - name: Upload Windows VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: continue-windows-extension
          path: extensions/vscode/build/continue-windows-x64.vsix
