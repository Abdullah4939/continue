name: Build VSIX (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Ensures any sub-modules are pulled

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'
          cache: 'npm'

      - name: Install Global Dependencies
        run: npm i -g vite @vscode/vsce lerna

      - name: Bootstrap Mono-repo
        # Lerna links all the @continuedev internal packages together
        run: |
          npm install
          npx lerna bootstrap
        shell: pwsh

      - name: Build Core and Internal Packages
        # We MUST build the core logic before the GUI can reference it
        run: |
          cd core
          npm run build
          cd ..
        shell: pwsh

      - name: Build GUI
        run: |
          cd gui
          npm run build
          cd ..
        shell: pwsh

      - name: Package Extension for Windows
        run: |
          cd extensions/vscode
          npm install
          npm run prepackage
          vsce package --target win32-x64 --out build/continue-windows-x64.vsix
        shell: pwsh

      - name: Upload Windows VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: continue-windows-extension
          path: extensions/vscode/build/continue-windows-x64.vsix
