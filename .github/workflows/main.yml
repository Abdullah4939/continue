name: Build Continue with Qwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'

      - name: Install Global Tooling
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Root Install
        run: npm install --legacy-peer-deps
        shell: pwsh

      - name: Build Internal Dependencies
        run: |
          cd packages/config-types; npm install --legacy-peer-deps; npm run build; cd ../..
          cd packages/terminal-security; npm install --legacy-peer-deps; npm run build; cd ../..
          cd packages/fetch; npm install --legacy-peer-deps; npm run build; cd ../..
          cd packages/openai-adapters; npm install --legacy-peer-deps; npm run build; cd ../..
          cd packages/config-yaml; npm install --legacy-peer-deps; npm run build; cd ../..
          cd packages/llm-info; npm install --legacy-peer-deps; npm run build; cd ../..
        shell: pwsh

      - name: Build Core (Analyze & Install)
        run: |
          cd core
          # Manually forcing the known missing core dependencies
          npm install partial-json @modelcontextprotocol/sdk --legacy-peer-deps
          npm install --legacy-peer-deps
          npx tsc -p tsconfig.npm.json --skipLibCheck --noEmitOnError false
          cd ..
        shell: pwsh
        continue-on-error: true

      - name: Build GUI (Analyze & Install)
        run: |
          cd gui
          # Manually forcing the modules Vite is failing to resolve
          npm install react-is partial-json @modelcontextprotocol/sdk --legacy-peer-deps
          npm install --legacy-peer-deps
          npx vite build
          cd ..
        shell: pwsh

      - name: Package VS Code Extension
        run: |
          cd extensions/vscode
          if (!(Test-Path build)) { New-Item -ItemType Directory -Path build }
          
          # Ensure build-essential scripts have their tools
          npm install ncp esbuild --legacy-peer-deps
          npm install --legacy-peer-deps
          
          npm run prepackage
          
          # Package without audit to ignore monorepo conflicts
          vsce package --target win32-x64 --no-dependencies --out build/continue-qwen.vsix
        shell: pwsh

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: continue-qwen-extension
          path: extensions/vscode/build/continue-qwen.vsix
