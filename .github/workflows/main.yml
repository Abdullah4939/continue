name: Build Continue with Qwen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.1'

      - name: Install Global Tooling
        run: npm i -g vite @vscode/vsce
        shell: pwsh

      - name: Root Install
        run: npm install
        shell: pwsh

      - name: Build Internal Dependencies
        run: |
          cd packages/config-types; npm install; npm run build; cd ../..
          cd packages/terminal-security; npm install; npm run build; cd ../..
          cd packages/fetch; npm install; npm run build; cd ../..
          cd packages/openai-adapters; npm install; npm run build; cd ../..
          cd packages/config-yaml; npm install; npm run build; cd ../..
          cd packages/llm-info; npm install; npm run build; cd ../..
        shell: pwsh

      - name: Build Core
        run: |
          cd core
          npm install partial-json
          npm install
          npx tsc -p tsconfig.npm.json --skipLibCheck --noEmitOnError false
          cd ..
        shell: pwsh
        continue-on-error: true

      - name: Build GUI
        run: |
          cd gui
          npm install partial-json
          npm install
          npx vite build
          cd ..
        shell: pwsh

      - name: Package VS Code Extension
        run: |
          cd extensions/vscode
          # 1. Create the missing 'build' directory to fix the meta.json error
          mkdir -p build
          
          npm install
          npm run prepackage
          
          # 2. Use --no-dependencies to bypass the 'npm list' / ELSPROBLEMS error
          vsce package --target win32-x64 --no-dependencies --out build/continue-qwen.vsix
        shell: pwsh

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: continue-qwen-extension
          path: extensions/vscode/build/continue-qwen.vsix
